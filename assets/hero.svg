<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ClaimLens — evidence you can trust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEEDFE"/>
    </linearGradient>
    <style>
      .d{font-family:"Plus Jakarta Sans",system-ui,sans-serif;font-weight:800}
      .b{font-family:Inter,system-ui,sans-serif}
      .m{font-family:"JetBrains Mono",ui-monospace,monospace}
    </style>
  </defs>
  <rect width="1200" height="340" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="338" rx="23" fill="none" stroke="#E6E9EF"/>
  <!-- left -->
  <circle cx="74" cy="70" r="13" fill="#4F46E5"/><path d="M68 70l4 4 8-9" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="96" y="78" class="d" font-size="30" fill="#0B0F19">Claim<tspan fill="#4F46E5">Lens</tspan></text>
  <text x="56" y="138" class="d" font-size="40" fill="#0B0F19">One photo →</text>
  <text x="56" y="186" class="d" font-size="40" fill="#4F46E5">an auditable verdict.</text>
  <text x="56" y="226" class="b" font-size="17" fill="#434A56">Multi-modal evidence review · human-in-the-loop · tiered CV → Gemini → Claude</text>
  <!-- verdict chips -->
  <g class="m" font-size="13">
    <rect x="56" y="252" width="118" height="34" rx="17" fill="#E8F6EE" stroke="#15924E" stroke-opacity=".4"/><circle cx="76" cy="269" r="4" fill="#15924E"/><text x="88" y="274" fill="#15924E">accept</text>
    <rect x="184" y="252" width="146" height="34" rx="17" fill="#FBF2DD" stroke="#B5791C" stroke-opacity=".4"/><circle cx="204" cy="269" r="4" fill="#B5791C"/><text x="216" y="274" fill="#B5791C">needs-info</text>
    <rect x="340" y="252" width="120" height="34" rx="17" fill="#FCEDED" stroke="#DC4B4F" stroke-opacity=".4"/><circle cx="360" cy="269" r="4" fill="#DC4B4F"/><text x="372" y="274" fill="#DC4B4F">decline</text>
  </g>
  <!-- right: verdict card -->
  <g transform="translate(770,70)">
    <rect x="0" y="0" width="370" height="200" rx="18" fill="#FFFFFF" stroke="#E6E9EF"/>
    <rect x="0" y="0" width="370" height="48" rx="18" fill="#E8F6EE"/><rect x="0" y="30" width="370" height="18" fill="#E8F6EE"/>
    <circle cx="28" cy="24" r="12" fill="#15924E"/><path d="M22 24l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="30" class="d" font-size="17" fill="#0F6E40">Accepted</text>
    <text x="300" y="29" class="m" font-size="11" fill="#B5791C">MEDIUM</text>
    <text x="24" y="86" class="m" font-size="10" fill="#777F8C">ISSUE</text><text x="24" y="106" class="d" font-size="16" fill="#0B0F19">dent</text>
    <text x="190" y="86" class="m" font-size="10" fill="#777F8C">PART</text><text x="190" y="106" class="d" font-size="16" fill="#0B0F19">rear bumper</text>
    <rect x="24" y="124" width="200" height="9" rx="4" fill="#F2F3F8"/><rect x="24" y="140" width="300" height="9" rx="4" fill="#F2F3F8"/>
    <text x="24" y="178" class="b" font-style="italic" font-size="11" fill="#777F8C">grounded in img_1 · conf 1.0 · routed Gemini→Claude</text>
  </g>
</svg>
